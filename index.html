<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Mogul: Supply & Demand</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance { font-size: 1.8rem; font-weight: bold; color: var(--success); font-family: monospace; }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .panel h2 { margin-top: 0; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .list-container { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }

        .item-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .item-card:hover, .item-card.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

        .card-row { display: flex; justify-content: space-between; align-items: center; }
        
        .name-stack { display: flex; flex-direction: column; }
        .item-name { font-weight: bold; font-size: 0.95rem; }
        .item-stock { font-size: 0.75rem; color: var(--muted); }

        .price-stack { text-align: right; }
        .change-val { font-family: monospace; font-weight: bold; font-size: 0.9rem; }
        .change-pct { font-size: 0.75rem; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-sell { background: var(--success); }

        canvas { flex: 1; background: #000; border-radius: 8px; margin-top: 10px; }

        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        
        /* Rarity colors */
        .r-Common { color: #94a3b8; }
        .r-Uncommon { color: #4ade80; }
        .r-Rare { color: #60a5fa; }
        .r-Epic { color: #c084fc; }
        .r-Mythic { color: #fbbf24; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.2rem;">EXCHANGE TERMINAL v2.0</h1>
        <div class="balance" id="balanceDisplay">500.00 €</div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Live Market (Volatility & Change)</h2>
            <div class="list-container" id="marketList"></div>
        </div>

        <div class="panel">
            <h2 id="chartTitle">Market History</h2>
            <canvas id="marketChart"></canvas>
            <div id="chartStats" style="margin-top: 10px; font-size: 0.8rem; display: flex; justify-content: space-around; color: var(--muted);"></div>
        </div>

        <div class="panel">
            <h2>Your Portfolio</h2>
            <div class="list-container" id="inventoryList"></div>
        </div>
    </div>

    <script>
        let money = 500.00;
        let selectedId = 0;
        const historyLength = 40;

        const items = [
            { id: 0, name: "Rusty Sword", rarity: "Common", basePrice: 20, currentPrice: 20, stock: 50, maxStock: 50, owned: 0, history: [] },
            { id: 1, name: "Leather Cap", rarity: "Common", basePrice: 45, currentPrice: 45, stock: 30, maxStock: 30, owned: 0, history: [] },
            { id: 2, name: "Steel Shield", rarity: "Uncommon", basePrice: 150, currentPrice: 150, stock: 15, maxStock: 15, owned: 0, history: [] },
            { id: 3, name: "Elven Bow", rarity: "Rare", basePrice: 500, currentPrice: 500, stock: 8, maxStock: 8, owned: 0, history: [] },
            { id: 4, name: "Ancient Relic", rarity: "Epic", basePrice: 1800, currentPrice: 1800, stock: 3, maxStock: 3, owned: 0, history: [] },
            { id: 5, name: "Dragon Heart", rarity: "Mythic", basePrice: 6000, currentPrice: 6000, stock: 1, maxStock: 1, owned: 0, history: [] }
        ];

        items.forEach(i => { for(let j=0; j<historyLength; j++) i.history.push(i.basePrice); });

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = money.toFixed(2) + " €";
            renderMarket();
            renderInventory();
            drawChart();
        }

        function renderMarket() {
            const list = document.getElementById('marketList');
            list.innerHTML = '';
            items.forEach(item => {
                const prev = item.history[item.history.length - 2];
                const diff = item.currentPrice - prev;
                const pct = (diff / prev) * 100;
                const colorClass = diff >= 0 ? 'trend-up' : 'trend-down';
                const sign = diff >= 0 ? '+' : '';

                const card = document.createElement('div');
                card.className = `item-card ${selectedId === item.id ? 'active' : ''}`;
                card.onclick = () => { selectedId = item.id; updateUI(); };
                card.innerHTML = `
                    <div class="card-row">
                        <div class="name-stack">
                            <span class="item-name r-${item.rarity}">${item.name}</span>
                            <span class="item-stock">Stock: ${item.stock}/${item.maxStock}</span>
                        </div>
                        <div class="price-stack">
                            <div class="change-val ${colorClass}">${sign}${diff.toFixed(2)} €</div>
                            <div class="change-pct ${colorClass}">${sign}${pct.toFixed(2)}%</div>
                        </div>
                        <button onclick="buyItem(${item.id}); event.stopPropagation();" 
                            ${(money < item.currentPrice || item.stock <= 0) ? 'disabled' : ''}>BUY</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderInventory() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = '';
            let hasAny = false;
            items.forEach(item => {
                if(item.owned > 0) {
                    hasAny = true;
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="card-row">
                            <div class="name-stack">
                                <span class="item-name r-${item.rarity}">${item.name} (x${item.owned})</span>
                                <span class="item-stock">Market: ${item.currentPrice.toFixed(2)}€</span>
                            </div>
                            <button class="btn-sell" onclick="sellItem(${item.id})">SELL</button>
                        </div>
                    `;
                    list.appendChild(card);
                }
            });
            if(!hasAny) list.innerHTML = '<p style="text-align:center; color:var(--muted); font-size:0.8rem;">No assets owned</p>';
        }

        function buyItem(id) {
            const item = items[id];
            if(money >= item.currentPrice && item.stock > 0) {
                money -= item.currentPrice;
                item.owned++;
                item.stock--;
                // Market Rule: Buying increases demand and price
                item.currentPrice *= 1.05; 
                updateUI();
            }
        }

        function sellItem(id) {
            const item = items[id];
            if(item.owned > 0) {
                money += item.currentPrice;
                item.owned--;
                item.stock++;
                // Market Rule: Selling increases supply and lowers price
                item.currentPrice *= 0.95;
                updateUI();
            }
        }

        function marketTick() {
            items.forEach(item => {
                // Base volatility
                let volatility = 0.02;
                if(item.rarity === "Mythic") volatility = 0.15;
                
                let change = 1 + (Math.random() * volatility * 2 - volatility);
                
                // MARKET RULE: Supply & Demand Multiplier
                // If stock is low (less than 20%), price starts climbing significantly
                const scarcityRatio = 1 - (item.stock / item.maxStock);
                if(scarcityRatio > 0.8) change += 0.02; // Scarcity premium
                
                item.currentPrice *= change;
                
                // Safety: Price can't be 0
                if(item.currentPrice < 1) item.currentPrice = 1;

                item.history.push(item.currentPrice);
                if(item.history.length > historyLength) item.history.shift();
            });
            updateUI();
        }

        function drawChart() {
            const canvas = document.getElementById('marketChart');
            const ctx = canvas.getContext('2d');
            const item = items[selectedId];
            
            document.getElementById('chartTitle').innerText = `${item.name} - Price History (${item.currentPrice.toFixed(2)} €)`;
            
            const w = canvas.width = canvas.offsetWidth;
            const h = canvas.height = canvas.offsetHeight;
            
            ctx.clearRect(0,0,w,h);
            
            // Grid lines
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 1;
            for(let i=0; i<10; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * (h/10)); ctx.lineTo(w, i * (h/10));
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(i * (w/10), 0); ctx.lineTo(i * (w/10), h);
                ctx.stroke();
            }

            const min = Math.min(...item.history) * 0.95;
            const max = Math.max(...item.history) * 1.05;
            const range = max - min;

            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = item.currentPrice >= item.history[0] ? "#10b981" : "#ef4444";
            
            item.history.forEach((val, i) => {
                const x = (i / (historyLength-1)) * w;
                const y = h - ((val - min) / range) * h;
                if(i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke();
            
            // Gradient
            ctx.lineTo(w, h); ctx.lineTo(0, h);
            const grad = ctx.createLinearGradient(0,0,0,h);
            grad.addColorStop(0, ctx.strokeStyle + "44");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.fill();

            document.getElementById('chartStats').innerHTML = `
                <span>LOW: ${min.toFixed(2)}€</span>
                <span>HIGH: ${max.toFixed(2)}€</span>
                <span>VOL: ${item.rarity}</span>
            `;
        }

        setInterval(marketTick, 3000);
        window.addEventListener('resize', drawChart);
        updateUI();
    </script>
</body>
</html>
