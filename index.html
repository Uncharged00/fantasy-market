<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON REWARD ENGINE</title>
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00ffff; --gold: #ffff00; }
        body { 
            background: #050505; color: white; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh;
        }
        
        /* The Juice / Screen Shake */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        #header { width: 100%; display: flex; justify-content: space-around; padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 2px solid var(--neon-pink); }
        .val { font-size: 2rem; text-shadow: 0 0 10px var(--neon-blue); }

        #display-case { 
            margin-top: 40px; position: relative; width: 400px; height: 150px; 
            border: 5px solid white; box-shadow: 0 0 30px var(--neon-pink);
            background: #000; overflow: hidden;
        }
        
        #reel { position: absolute; width: 100%; top: 0; text-align: center; }
        .slot-item { 
            height: 150px; line-height: 150px; font-size: 4rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 5px;
        }

        #btn-spin {
            margin-top: 40px; padding: 25px 80px; font-size: 2rem; font-weight: 900;
            background: var(--neon-pink); border: none; color: white; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.1s; box-shadow: 0 0 20px var(--neon-pink);
        }
        #btn-spin:active { transform: scale(0.95); filter: brightness(1.5); }

        .particle {
            position: absolute; pointer-events: none; width: 10px; height: 10px;
            background: var(--gold); border-radius: 50%;
        }

        #xp-container { width: 400px; height: 10px; background: #222; margin-top: 20px; }
        #xp-bar { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body id="body">

<div id="header">
    <div>GEMS: <span id="gems" class="val">1000</span></div>
    <div>LVL: <span id="lvl" class="val">1</span></div>
</div>
<div id="xp-container"><div id="xp-bar"></div></div>

<div id="display-case">
    <div id="reel"></div>
</div>

<button id="btn-spin" onclick="play()">SPIN</button>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let gems = 1000;
    let lvl = 1;
    let xp = 0;

    const items = [
        { name: "LOSS", color: "#333", sound: 100 },
        { name: "WIN", color: "var(--neon-blue)", sound: 400 },
        { name: "MEGA", color: "var(--neon-pink)", sound: 800 },
        { name: "JACKPOT", color: "var(--gold)", sound: 1200 }
    ];

    function createReel() {
        const reel = document.getElementById('reel');
        reel.innerHTML = '';
        for(let i=0; i<50; i++) {
            const item = items[Math.floor(Math.random() * items.length)];
            const div = document.createElement('div');
            div.className = 'slot-item';
            div.style.color = item.color;
            div.innerText = item.name;
            reel.appendChild(div);
        }
    }

    function beep(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function spawnParticles() {
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = '50%';
            p.style.top = '50%';
            p.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
            document.body.appendChild(p);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 5 + Math.random() * 10;
            let x = 0, y = 0;
            
            const anim = setInterval(() => {
                x += Math.cos(angle) * velocity;
                y += Math.sin(angle) * velocity;
                p.style.transform = `translate(${x}px, ${y}px)`;
                p.style.opacity -= 0.02;
                if(p.style.opacity <= 0) { clearInterval(anim); p.remove(); }
            }, 16);
        }
    }

    function play() {
        if(gems < 50) return;
        gems -= 50;
        document.getElementById('gems').innerText = gems;
        
        // Sensory feedback: Start
        document.getElementById('body').classList.add('shake');
        beep(150, 'sawtooth', 0.2);

        const reel = document.getElementById('reel');
        const roll = Math.random();
        let winIdx = roll < 0.05 ? 3 : (roll < 0.15 ? 2 : (roll < 0.4 ? 1 : 0));
        
        // Force the reel to land on result
        reel.children[45].innerText = items[winIdx].name;
        reel.children[45].style.color = items[winIdx].color;
        
        reel.style.transition = 'none';
        reel.style.top = '0px';
        
        setTimeout(() => {
            reel.style.transition = 'top 1s cubic-bezier(0.1, 0, 0.1, 1.2)';
            reel.style.top = '-6750px'; // 45 items * 150px
        }, 50);

        setTimeout(() => {
            document.getElementById('body').classList.remove('shake');
            finish(winIdx);
        }, 1100);
    }

    function finish(idx) {
        const item = items[idx];
        beep(item.sound, 'square', 0.5);
        
        if(idx > 0) {
            spawnParticles();
            gems += (idx * 200);
            xp += 34;
        } else {
            xp += 10;
        }

        if(xp >= 100) {
            xp = 0; lvl++;
            beep(2000, 'sine', 1);
            alert("LEVEL UP! LUCK INCREASED!"); // Psychological hook
        }

        document.getElementById('gems').innerText = gems;
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('xp-bar').style.width = xp + "%";
    }

    createReel();
</script>
</body>
</html>
