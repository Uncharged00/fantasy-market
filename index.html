<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Fantasy Market Broker</title>\n    <link rel="stylesheet" href="style.css">\n</head>\n<body>\n    <div class="container">\n        <header>\n            <h1>Fantasy Market Broker</h1>\n            <div class="stats">\n                <div class="stat-box">\n                    <span>Balance:</span>\n                    <span id="balance">500.00 €</span>\n                </div>\n                <div class="stat-box">\n                    <span>Net Worth:</span>\n                    <span id="net-worth">500.00 €</span>\n                </div>\n                <div class="stat-box">\n                    <span>Next Tick:</span>\n                    <span id="tick-timer">5s</span>\n                </div>\n            </div>\n        </header>\n\n        <main>\n            <section class="market-section">\n                <h2>Market</h2>\n                <div class="market-grid" id="market">\n                    <!-- Market items will be injected here -->\n                </div>\n            </section>\n\n            <section class="inventory-section">\n                <h2>Your Inventory</h2>\n                <div class="inventory-list" id="inventory">\n                    <!-- Inventory items will be injected here -->\n                </div>\n            </section>\n        </main>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>
