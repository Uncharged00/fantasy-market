<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Mogul: Terminal Edition</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161a25;
            --border: #2b2f3a;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #3b82f6;
            --success: #00ffaa;
            --danger: #ff4466;
        }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .balance { font-size: 1.5rem; color: var(--success); }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr 380px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .panel h2 { margin: 0 0 10px 0; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        .list-container { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 5px; }

        .item-card {
            background: #1c212e;
            border: 1px solid transparent;
            padding: 10px;
            cursor: pointer;
            display: grid;
            grid-template-columns: 1fr 100px 70px;
            align-items: center;
            gap: 10px;
        }

        .item-card:hover, .item-card.active { border-color: var(--accent); background: #232936; }

        .name-cell { display: flex; flex-direction: column; }
        .item-name { font-weight: bold; font-size: 0.9rem; }
        .item-stock { font-size: 0.7rem; color: var(--muted); }

        .change-cell-val { text-align: center; font-size: 0.9rem; font-weight: bold; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
        }

        button:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-sell { background: #334155; border: 1px solid var(--border); }
        .btn-sell:hover { background: var(--danger); }

        /* Chart Controls */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }
        .zoom-controls { display: flex; gap: 5px; }
        .zoom-btn { background: #2b2f3a; padding: 2px 8px; border: 1px solid var(--border); }
        .zoom-btn:hover { background: var(--accent); }

        .chart-container { flex: 1; position: relative; margin-top: 10px; }
        canvas { width: 100%; height: 100%; background: #000; }

        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        
        .r-Common { color: #94a3b8; }
        .r-Uncommon { color: #4ade80; }
        .r-Rare { color: #60a5fa; }
        .r-Epic { color: #c084fc; }
        .r-Mythic { color: #fbbf24; }
    </style>
</head>
<body>

    <div class="header">
        <div>CORE_EXCHANGE // SYS_ACTIVE</div>
        <div class="balance" id="balanceDisplay">500.00 €</div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Market Performance</h2>
            <div class="list-container" id="marketList"></div>
        </div>

        <div class="panel">
            <div class="chart-header">
                <h2 id="chartTitle" style="border:none; margin:0;">Market History</h2>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="changeZoom(0.2)">—</button>
                    <button class="zoom-btn" onclick="changeZoom(-0.2)">+</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="marketChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <h2>Inventory Management</h2>
            <div class="list-container" id="inventoryList"></div>
        </div>
    </div>

    <script>
        let money = 500.00;
        let selectedId = 0;
        let zoomLevel = 1.5; // Default "zoomed out"
        const historyLength = 50;

        const items = [
            { id: 0, name: "Rusty Blade", rarity: "Common", basePrice: 20, currentPrice: 20, stock: 100, maxStock: 100, owned: 0, history: [] },
            { id: 1, name: "Iron Plate", rarity: "Common", basePrice: 50, currentPrice: 50, stock: 50, maxStock: 50, owned: 0, history: [] },
            { id: 2, name: "Steel Mace", rarity: "Uncommon", basePrice: 180, currentPrice: 180, stock: 25, maxStock: 25, owned: 0, history: [] },
            { id: 3, name: "Silver Bow", rarity: "Rare", basePrice: 600, currentPrice: 600, stock: 12, maxStock: 12, owned: 0, history: [] },
            { id: 4, name: "Void Relic", rarity: "Epic", basePrice: 2200, currentPrice: 2200, stock: 5, maxStock: 5, owned: 0, history: [] },
            { id: 5, name: "Star Shard", rarity: "Mythic", basePrice: 8500, currentPrice: 8500, stock: 2, maxStock: 2, owned: 0, history: [] }
        ];

        items.forEach(i => { for(let j=0; j<historyLength; j++) i.history.push(i.basePrice); });

        function changeZoom(val) {
            zoomLevel = Math.max(0.1, zoomLevel + val);
            drawChart();
        }

        function buyItem(id) {
            const item = items[id];
            if(money >= item.currentPrice && item.stock > 0) {
                money -= item.currentPrice;
                item.owned++;
                item.stock--;
                item.currentPrice *= 1.005; 
                updateUI();
            }
        }

        function sellItem(id) {
            const item = items[id];
            if(item.owned > 0) {
                money += item.currentPrice;
                item.owned--;
                item.stock++;
                item.currentPrice *= 0.995;
                updateUI();
            }
        }

        function marketTick() {
            items.forEach(item => {
                let volatility = { "Common": 0.002, "Uncommon": 0.005, "Rare": 0.01, "Epic": 0.015, "Mythic": 0.03 }[item.rarity];
                let drift = (Math.random() * volatility * 2 - volatility);
                const stockRatio = item.stock / item.maxStock;
                if(stockRatio < 0.10) drift += 0.005; 

                item.currentPrice *= (1 + drift);
                if(item.currentPrice < item.basePrice * 0.2) item.currentPrice = item.basePrice * 0.2;

                item.history.push(item.currentPrice);
                if(item.history.length > historyLength) item.history.shift();
            });
            updateUI();
        }

        function renderMarket() {
            const list = document.getElementById('marketList');
            list.innerHTML = '';
            items.forEach(item => {
                const prev = item.history[item.history.length - 2];
                const pct = ((item.currentPrice - prev) / prev) * 100;
                const color = pct >= 0 ? 'trend-up' : 'trend-down';

                const card = document.createElement('div');
                card.className = `item-card ${selectedId === item.id ? 'active' : ''}`;
                card.onclick = () => { selectedId = item.id; updateUI(); };
                card.innerHTML = `
                    <div class="name-cell">
                        <span class="item-name r-${item.rarity}">${item.name}</span>
                        <span class="item-stock">STOCK: ${item.stock}</span>
                    </div>
                    <div class="change-cell-val ${color}">
                        ${pct >= 0 ? '▲' : '▼'} ${Math.abs(pct).toFixed(2)}%
                    </div>
                    <div class="action-cell">
                        <button onclick="buyItem(${item.id}); event.stopPropagation();" 
                            ${(money < item.currentPrice || item.stock <= 0) ? 'disabled' : ''}>BUY</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderInventory() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = '';
            items.filter(i => i.owned > 0).forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.gridTemplateColumns = '1fr 80px';
                card.innerHTML = `
                    <div class="name-cell">
                        <span class="item-name r-${item.rarity}">${item.name} (x${item.owned})</span>
                        <span class="item-stock">TOTAL: ${(item.currentPrice * item.owned).toFixed(2)}€</span>
                    </div>
                    <button class="btn-sell" onclick="sellItem(${item.id})">SELL</button>
                `;
                list.appendChild(card);
            });
        }

        function drawChart() {
            const canvas = document.getElementById('marketChart');
            const ctx = canvas.getContext('2d');
            const item = items[selectedId];
            
            document.getElementById('chartTitle').innerText = `${item.name} - LIVE: ${item.currentPrice.toFixed(2)}€`;
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);
            
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            const paddingRight = 85;
            const chartW = w - paddingRight;

            ctx.clearRect(0, 0, w, h);

            let min = Math.min(...item.history);
            let max = Math.max(...item.history);
            
            let mid = (max + min) / 2;
            let currentRange = max - min;
            // zoomLevel 1.5 = zoomed out (original user request)
            // smaller zoomLevel = zoomed in
            let zoomedRange = Math.max(currentRange * zoomLevel, 0.1); 
            
            let displayMin = mid - (zoomedRange / 2);
            let displayMax = mid + (zoomedRange / 2);
            let finalRange = displayMax - displayMin;

            ctx.strokeStyle = '#1e293b';
            ctx.fillStyle = '#64748b';
            ctx.font = '10px monospace';

            const gridCount = 5;
            for(let i=0; i<=gridCount; i++) {
                const y = h - (i/gridCount) * h;
                const p = (displayMin + (i/gridCount) * finalRange).toFixed(2);
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(chartW, y); ctx.stroke();
                ctx.fillText(p + "€", chartW + 5, y + 3);
            }

            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = item.currentPrice >= item.history[0] ? "#00ffaa" : "#ff4466";
            
            item.history.forEach((val, i) => {
                const x = (i / (historyLength - 1)) * chartW;
                const y = h - ((val - displayMin) / finalRange) * h;
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.lineTo(chartW, h); ctx.lineTo(0, h);
            const grad = ctx.createLinearGradient(0,0,0,h);
            grad.addColorStop(0, ctx.strokeStyle + "33");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad; ctx.fill();
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = money.toFixed(2) + " €";
            renderMarket();
            renderInventory();
            drawChart();
        }

        setInterval(marketTick, 2500);
        window.addEventListener('resize', drawChart);
        updateUI();
    </script>
</body>
</html>
