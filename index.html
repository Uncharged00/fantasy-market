<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Reward Loop</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #display { font-size: 3rem; font-weight: bold; margin: 20px; text-shadow: 0 0 20px rgba(255,255,255,0.5); height: 100px; }
        .rarity-common { color: #888; }
        .rarity-rare { color: #3498db; text-shadow: 0 0 10px #3498db; }
        .rarity-epic { color: #9b59b6; text-shadow: 0 0 15px #9b59b6; }
        .rarity-legendary { color: #f1c40f; text-shadow: 0 0 25px #f1c40f; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: #e74c3c; border: none; color: white; border-radius: 50px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button:active { transform: translateY(3px); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #stats { position: absolute; bottom: 20px; font-family: monospace; color: #555; }
    </style>
</head>
<body>

    <div id="display">READY?</div>
    <button onclick="spin()">SPIN FOR GLORY</button>
    
    <div id="stats">
        Spins: <span id="count">0</span> | 
        Legendaries Found: <span id="leg-count">0</span>
    </div>

<script>
    const items = [
        { name: "Rusty Spoon", rarity: "common", weight: 70 },
        { name: "Silver Coin", rarity: "rare", weight: 20 },
        { name: "Crystal Blade", rarity: "epic", weight: 9 },
        { name: "GOD SLAYER", rarity: "legendary", weight: 1 }
    ];

    let spins = 0;
    let legs = 0;

    function spin() {
        spins++;
        document.getElementById('count').innerText = spins;
        
        // The core probability logic
        let random = Math.random() * 100;
        let cumulativeWeight = 0;
        let selected = items[0];

        for (let item of items) {
            cumulativeWeight += item.weight;
            if (random < cumulativeWeight) {
                selected = item;
                break;
            }
        }

        const display = document.getElementById('display');
        display.innerText = selected.name;
        display.className = `rarity-${selected.rarity}`;

        if (selected.rarity === 'legendary') {
            legs++;
            document.getElementById('leg-count').innerText = legs;
            alert("✨ A 1% CHANCE! YOU ARE CHOSEN! ✨");
        }
    }
</script>
</body>
</html>
